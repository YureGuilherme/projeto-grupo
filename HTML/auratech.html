<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Auratech</title>
  <link rel="stylesheet" href="style/auratech.css">
</head>
<body>

<header>
  <div class="logo">
    <img 
      src="img/logo_auratech.png" 
      alt="Auratech" 
      width="150">
  </div>
</div>
  <nav>
    <a href="#">Home</a>
    <a href="produtos/produtos.html">Produtos</a>
    <a href="#">Sobre</a>
    <a href="#">Contato</a>
  </nav>
  <div class="icons">
    🛒
  </div>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>Promoções da Semana</h1>
    <button>Ver Produtos</button>
  </div>
  <div class="hero-img">
    <img src="img/banner.png" alt="">
  </div>
</section>

<section class="produtos">
  <h2>Produtos em Destaque</h2>

  <div class="grid">
    <div class="card">
      <img src="img/celular.png">
      <p>R$000,00</p>
      <button>Adicionar ao carrinho</button>
    </div>

    <div class="card">
      <img src="img/fone.png">
      <p>R$000,00</p>
      <button>Adicionar ao carrinho</button>
    </div>

    <div class="card">
      <img src="img/relogio.png">
      <p>R$000,00</p>
      <button>Adicionar ao carrinho</button>
    </div>

    <div class="card">
      <img src="img/notebook.png">
      <p>R$000,00</p>
      <button>Adicionar ao carrinho</button>
    </div>
  </div>
</section>

<section class="info">
  <div class="categorias">
    <h3>Categorias</h3>
    <div class="icons-cat">
      <img src="img/celular.png">
      <img src="img/fone.png">
      <img src="img/relogio.png">
      <img src="img/notebook.png">
    </div>
  </div>

  <div class="contato">
    <h3>Contato</h3>
    <p>Email: contato@email.com</p>
    <p>Telefone: (00) 00000-0000</p>
  </div>
</section>

<footer>
  <p>© 2026 Auratech</p>
</footer>

</body>
</html>
